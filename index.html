<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기후변화과학 퀴즈대회 모의고사</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #f0f4f8; text-align: center; padding: 40px 20px; color: #333; }
        .quiz-container { background: white; max-width: 650px; margin: auto; padding: 35px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        .progress { font-size: 0.9em; color: #666; margin-bottom: 25px; font-weight: bold; background: #e8f0fe; display: inline-block; padding: 5px 15px; border-radius: 20px; }
        .question { font-size: 1.25em; margin-bottom: 25px; font-weight: bold; word-break: keep-all; line-height: 1.6; text-align: left; }
        
        /* 선택 화면 버튼 스타일 */
        #selection-screen, #score-screen { margin-top: 30px; }
        h3 { margin-bottom: 20px; color: #333; }
        .type-btn { display: block; width: 100%; padding: 18px; margin: 12px 0; border: 2px solid #1a73e8; border-radius: 10px; background: #fff; color: #1a73e8; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .type-btn:hover { background: #1a73e8; color: #fff; }

        .options button { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #dcdcdc; border-radius: 8px; background: #fff; font-size: 1.05em; cursor: pointer; transition: 0.2s; text-align: left; }
        .options button:hover:not(:disabled) { background: #f1f3f4; border-color: #c0c0c0; }
        .options button:disabled { cursor: not-allowed; color: #555; }
        
        .short-answer-container { display: flex; gap: 10px; margin-top: 15px; }
        .short-answer-container input { flex: 1; padding: 15px; border: 1px solid #dcdcdc; border-radius: 8px; font-size: 1.05em; }
        .short-answer-container button { padding: 15px 25px; background: #34a853; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.05em; font-weight: bold; white-space: nowrap; }
        .short-answer-container button:hover:not(:disabled) { background: #2d9047; }
        
        #result { margin-top: 25px; font-weight: bold; font-size: 1.3em; }
        .explanation { display: none; margin-top: 20px; padding: 20px; background-color: #e8f0fe; border-left: 6px solid #1a73e8; border-radius: 6px; font-size: 1em; text-align: left; line-height: 1.6; color: #202124; }
        
        #next-btn { display: none; margin: 30px auto 0; padding: 14px 28px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; width: 100%; }
        #next-btn:hover { background: #1557b0; }
        
        /* 점수 화면 버튼 */
        #score-text { font-size: 2em; color: #ea4335; font-weight: bold; margin: 20px 0; }
        #retry-btn { display: none; margin: 15px auto 0; padding: 14px 28px; background: #ea4335; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; width: 100%; }
        #retry-btn:hover { background: #c5221f; }
        #home-btn { display: block; margin: 15px auto 0; padding: 14px 28px; background: #34a853; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; width: 100%; }
        #home-btn:hover { background: #2d9047; }

        #loading { font-size: 1.2em; color: #1a73e8; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>🌍 기후변화과학 퀴즈대회 모의고사</h2>
    <div class="progress" id="progress-text" style="display: none;">준비 중...</div>
    
    <div id="loading">🚀 400문제를 불러오는 중입니다... 잠시만 기다려주세요!</div>
    
    <div id="selection-screen" style="display: none;">
        <h3>도전할 문제 유형을 선택하세요! (1회 10문제) 👇</h3>
        <button class="type-btn" onclick="startQuiz('ox')">⭕❌ O/X 문제 풀기</button>
        <button class="type-btn" onclick="startQuiz('mcq')">🔢 객관식 문제 풀기</button>
        <button class="type-btn" onclick="startQuiz('short')">✍️ 주관식 문제 풀기</button>
    </div>

    <div id="quiz" style="display: none;">
        <div class="question" id="question-text">문제가 여기에 나옵니다.</div>
        <div class="options" id="options"></div>
        <div id="result"></div>
        <div class="explanation" id="explanation"></div>
        <button id="next-btn">다음 문제 ➔</button>
    </div>

    <div id="score-screen" style="display: none;">
        <h3>수고하셨습니다! 🎉</h3>
        <div id="score-text">10문제 중 8문제 정답!</div>
        <button id="retry-btn" onclick="retryIncorrect()">📝 틀린 문제 다시 풀어보기</button>
        <button id="home-btn" onclick="goHome()">🏠 처음으로 돌아가기</button>
    </div>
</div>

<script>
    let allQuizData = []; 
    let sessionQuestions = []; 
    let incorrectQuestions = []; 
    let currentQuestion = 0;
    let score = 0;
    
    const loadingEl = document.getElementById("loading");
    const selectionScreen = document.getElementById("selection-screen");
    const quizEl = document.getElementById("quiz");
    const scoreScreen = document.getElementById("score-screen");
    
    const questionEl = document.getElementById("question-text");
    const optionsEl = document.getElementById("options");
    const resultEl = document.getElementById("result");
    const explanationEl = document.getElementById("explanation");
    const nextBtn = document.getElementById("next-btn");
    
    const scoreText = document.getElementById("score-text");
    const retryBtn = document.getElementById("retry-btn");
    const progressEl = document.getElementById("progress-text");

    // 배열을 랜덤하게 섞어주는 함수
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 불필요한 표시를 텍스트에서 자동으로 지워주는 마법의 함수!
    function cleanText(str) {
        if (!str) return "";
        return String(str).replace(/\/gi, "").trim();
    }

    Papa.parse("quiz.csv", {
        download: true,
        header: true, 
        skipEmptyLines: true, 
        complete: function(results) {
            allQuizData = results.data.map((row, index) => {
                let options = [];
                if (row.종류 === 'ox') {
                    options = [cleanText(row.보기1), cleanText(row.보기2)].filter(Boolean);
                } else if (row.종류 === 'mcq') {
                    options = [cleanText(row.보기1), cleanText(row.보기2), cleanText(row.보기3), cleanText(row.보기4)].filter(Boolean); 
                }
                return {
                    id: index, // 문제마다 고유 번호를 부여해서 푼 문제인지 기억함!
                    type: row.종류,
                    question: cleanText(row.문제),
                    options: options,
                    answer: cleanText(row.정답),
                    explanation: cleanText(row.해설)
                };
            });
            
            loadingEl.style.display = "none";
            selectionScreen.style.display = "block";
        },
        error: function() {
            loadingEl.innerText = "❌ quiz.csv 파일을 찾을 수 없습니다!";
            loadingEl.style.color = "red";
        }
    });

    // 퀴즈 시작 (기억된 정보 확인 후 안 푼 문제 10개 뽑기)
    function startQuiz(type) {
        let filteredQuizData = allQuizData.filter(q => q.type === type);
        
        // 내 스마트폰(브라우저)에 저장된 '이미 푼 문제 번호들' 불러오기
        let solvedIds = JSON.parse(localStorage.getItem('solved_' + type)) || [];
        
        // 전체 문제 중 아직 안 푼 문제만 걸러내기
        let unsolvedQuestions = filteredQuizData.filter(q => !solvedIds.includes(q.id));

        // 만약 모든 문제를 다 풀었다면? 
        if (unsolvedQuestions.length === 0) {
            alert("👏 이 유형의 모든 문제를 다 풀었습니다! 기록을 초기화하고 처음부터 다시 복습합니다.");
            solvedIds = []; // 기억 리셋
            localStorage.setItem('solved_' + type, JSON.stringify(solvedIds));
            unsolvedQuestions = [...filteredQuizData]; // 다시 전체 문제로 세팅
        }

        shuffleArray(unsolvedQuestions); // 안 푼 문제들을 랜덤하게 섞기
        sessionQuestions = unsolvedQuestions.slice(0, 10); // 앞에서부터 10개만 딱 자르기
        
        // 이번에 뽑힌 10문제를 '이미 푼 문제' 목록에 추가해서 저장해두기
        let newSolvedIds = [...solvedIds, ...sessionQuestions.map(q => q.id)];
        localStorage.setItem('solved_' + type, JSON.stringify(newSolvedIds));
        
        incorrectQuestions = [];
        currentQuestion = 0;
        score = 0;
        
        selectionScreen.style.display = "none";
        scoreScreen.style.display = "none";
        progressEl.style.display = "inline-block";
        quizEl.style.display = "block";
        
        loadQuestion();
    }

    // 틀린 문제만 다시 풀기
    function retryIncorrect() {
        sessionQuestions = [...incorrectQuestions]; 
        incorrectQuestions = []; 
        currentQuestion = 0;
        score = 0;

        scoreScreen.style.display = "none";
        quizEl.style.display = "block";
        
        loadQuestion();
    }

    function loadQuestion() {
        resultEl.innerText = "";
        explanationEl.style.display = "none";
        explanationEl.innerText = "";
        nextBtn.style.display = "none";
        optionsEl.innerHTML = "";
        
        const currentQuiz = sessionQuestions[currentQuestion];
        progressEl.innerText = `총 ${sessionQuestions.length}문제 중 ${currentQuestion + 1}번 문제`;
        questionEl.innerText = `Q. ` + currentQuiz.question;

        if (currentQuiz.type === "ox" || currentQuiz.type === "mcq") {
            currentQuiz.options.forEach(option => {
                const button = document.createElement("button");
                button.innerText = option;
                button.onclick = () => checkAnswer(option, button);
                optionsEl.appendChild(button);
            });
        } else if (currentQuiz.type === "short") {
            const container = document.createElement("div");
            container.className = "short-answer-container";
            const input = document.createElement("input");
            input.type = "text";
            input.placeholder = "정답을 입력하세요 (띄어쓰기 주의)";
            input.id = "short-input";
            input.autocomplete = "off";
            
            const submitBtn = document.createElement("button");
            submitBtn.innerText = "제출";
            submitBtn.onclick = () => checkAnswer(input.value.trim(), submitBtn);

            input.addEventListener("keypress", function(event) {
                if (event.key === "Enter") { event.preventDefault(); submitBtn.click(); }
            });
            
            container.appendChild(input);
            container.appendChild(submitBtn);
            optionsEl.appendChild(container);
            setTimeout(() => input.focus(), 100);
        }
    }

    function checkAnswer(userAnswer, element) {
        if(!userAnswer) return; 
        
        const currentQuiz = sessionQuestions[currentQuestion];
        const cleanUserAnswer = userAnswer.replace(/\s+/g, "");
        const cleanCorrectAnswer = currentQuiz.answer.replace(/\s+/g, "");
        
        const isCorrect = (currentQuiz.type === "short") ? (cleanUserAnswer === cleanCorrectAnswer) : (userAnswer === currentQuiz.answer);
        
        if (currentQuiz.type === "short") {
            document.getElementById("short-input").disabled = true;
            element.disabled = true;
        } else {
            const allButtons = optionsEl.querySelectorAll("button");
            allButtons.forEach(btn => btn.disabled = true);
        }

        if (isCorrect) {
            score++; 
            resultEl.innerText = "🎉 정답입니다!";
            resultEl.style.color = "#188038";
            if (currentQuiz.type !== "short") { 
                element.style.background = "#e6f4ea"; 
                element.style.borderColor = "#188038"; 
                element.style.fontWeight = "bold";
            }
        } else {
            incorrectQuestions.push(currentQuiz); 
            resultEl.innerText = "❌ 오답입니다. (정답: " + currentQuiz.answer + ")";
            resultEl.style.color = "#d93025";
            if (currentQuiz.type !== "short") { 
                element.style.background = "#fce8e6"; 
                element.style.borderColor = "#d93025"; 
            }
        }

        explanationEl.innerHTML = "<strong>💡 해설:</strong><br>" + currentQuiz.explanation;
        explanationEl.style.display = "block";
        nextBtn.style.display = "block";
    }

    nextBtn.onclick = () => {
        currentQuestion++;
        if (currentQuestion < sessionQuestions.length) {
            loadQuestion();
        } else {
            showScoreScreen();
        }
    };

    function showScoreScreen() {
        quizEl.style.display = "none";
        progressEl.style.display = "none";
        scoreScreen.style.display = "block";
        
        scoreText.innerText = `${sessionQuestions.length}문제 중 ${score}문제 정답!`;
        
        if (incorrectQuestions.length > 0) {
            retryBtn.style.display = "block";
            scoreText.style.color = "#ea4335"; 
        } else {
            retryBtn.style.display = "none";
            scoreText.innerText += " 💯 완벽해요!";
            scoreText.style.color = "#188038"; 
        }
    }

    function goHome() {
        scoreScreen.style.display = "none";
        selectionScreen.style.display = "block";
    }
</script>

</body>
</html>
